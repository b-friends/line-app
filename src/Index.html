<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8"/>
  <title><?= publicConfig.appTitle ?></title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <?!= include('Styles'); ?>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <header class="header card">
    <div>
      <p class="eyebrow">Bフレンズ ソフトバレー</p>
      <h1 id="appTitle"><?= publicConfig.appTitle ?></h1>
      <p class="muted">LINEから参加予定を登録できます。</p>
    </div>
    <div class="pill" id="connectionStatus">初期化中…</div>
  </header>

  <!-- 利用者情報 -->
  <section class="card" id="memberCard">
    <h2>利用者</h2>
    <div class="member-grid">
      <div><div class="label">LINE表示名</div><div class="value" id="lineProfileName">-</div></div>
      <div><div class="label">名簿上の氏名</div><div class="value" id="memberName">未登録</div></div>
      <div><div class="label">No</div><div class="value" id="memberNo">-</div></div>
    </div>
  </section>

  <!-- 初回登録 -->
  <section class="card hidden" id="registerCard">
    <h2>初回登録（名簿との紐付け）</h2>
    <p class="muted">名簿に登録されている方は氏名を選択、新規の方は「新規登録」から情報を入力してください。</p>

    <!-- タブ切り替え -->
    <div class="tab-row">
      <button class="tab-btn active" id="tabExisting" type="button">名簿から選択</button>
      <button class="tab-btn" id="tabNew" type="button">新規登録</button>
    </div>

    <!-- 既存メンバー選択 -->
    <div id="existingPane">
      <div class="form-grid">
        <label class="full-width">
          <span>氏名で検索</span>
          <input type="text" id="nameSearch" placeholder="名前の一部を入力…" autocomplete="off"/>
        </label>
      </div>
      <div class="name-list hidden" id="nameList"></div>
      <div style="margin-top:10px;font-size:16px;font-weight:700" id="selectedName"></div>
      <div class="actions">
        <button class="primary" id="registerButton" disabled>この名前で登録する</button>
      </div>
    </div>

    <!-- 新規メンバー登録 -->
    <div id="newPane" class="hidden">
      <div class="form-grid">
        <label>
          <span>氏名（必須）</span>
          <input type="text" id="newFullName" placeholder="例: 山田 太郎"/>
        </label>
        <label>
          <span>ふりがな</span>
          <input type="text" id="newFurigana" placeholder="例: やまだ たろう"/>
        </label>
        <label>
          <span>性別（必須）</span>
          <select id="newGender">
            <option value="">選択…</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </label>
        <label>
          <span>生年月日</span>
          <input type="date" id="newBirthDate"/>
        </label>
        <label>
          <span>携帯電話</span>
          <input type="tel" id="newMobilePhone" placeholder="090-xxxx-xxxx"/>
        </label>
      </div>
      <div class="actions">
        <button class="primary" id="registerNewButton">新規登録する</button>
      </div>
    </div>
  </section>

  <!-- 参加予定 -->
  <section class="card" id="scheduleCard">
    <div class="section-head">
      <h2>参加予定</h2>
      <div class="muted" id="lastSavedAt">未保存</div>
    </div>
    <div id="scheduleRoot" class="schedule-root"></div>
    <div class="actions sticky-actions">
      <button class="primary" id="saveButton">参加予定を保存</button>
    </div>
  </section>

  <!-- 管理者: 当日参加チェック -->
  <section class="card hidden" id="adminCard">
    <div class="section-head">
      <h2>当日参加チェック（管理者）</h2>
    </div>
    <div id="adminRoot"></div>
  </section>

  <!-- チーム編成（全員利用可） -->
  <section class="card hidden" id="teamCard">
    <h2>チーム編成</h2>
    <p class="muted">参加者を年齢・性別・勝率バランスで自動振り分けします。</p>
    <div class="form-grid">
      <label>
        <span>対象の予定</span>
        <select id="teamSessionSelect"></select>
      </label>
      <label>
        <span>ゲーム数</span>
        <select id="numGamesSelect">
          <option value="2">2ゲーム</option>
          <option value="3" selected>3ゲーム</option>
          <option value="4">4ゲーム</option>
          <option value="5">5ゲーム</option>
        </select>
      </label>
    </div>
    <div class="actions">
      <button class="primary" id="generateTeamsBtn">チーム編成を実行</button>
      <button class="secondary hidden" id="exportListBtn">参加者リスト出力</button>
    </div>
    <div id="teamResult" class="team-result"></div>
  </section>

  <!-- 試合結果入力（全員利用可） -->
  <section class="card hidden" id="resultCard">
    <h2>試合結果入力</h2>
    <p class="muted">各ゲームのスコアを入力して保存すると、個人勝率に反映されます。</p>
    <div id="resultRoot"></div>
    <div class="actions">
      <button class="primary" id="saveResultsBtn">結果を保存</button>
    </div>
  </section>

  <!-- 勝率一覧（全員閲覧可） -->
  <section class="card hidden" id="winRateCard">
    <div class="section-head">
      <h2>個人勝率</h2>
      <button class="secondary" id="refreshWinRateBtn">更新</button>
    </div>
    <div id="winRateRoot"></div>
  </section>

  <!-- メッセージ -->
  <section class="card" id="messageCard">
    <h2>メッセージ</h2>
    <div id="messageArea" class="message info">初期化を開始します。</div>
  </section>

</div>

<script>
const PUBLIC_CONFIG = <?= JSON.stringify(publicConfig) ?>;
const S = { idToken:'', lineProfileName:'', member:null, schedule:[], isAdmin:false, memberNames:[] };

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('registerButton').addEventListener('click', doRegister);
  document.getElementById('registerNewButton').addEventListener('click', doRegisterNew);
  document.getElementById('saveButton').addEventListener('click', doSave);
  document.getElementById('generateTeamsBtn').addEventListener('click', doGenerateTeams);
  document.getElementById('exportListBtn').addEventListener('click', doExportList);
  document.getElementById('saveResultsBtn').addEventListener('click', doSaveResults);
  document.getElementById('refreshWinRateBtn').addEventListener('click', doRefreshWinRates);
  document.getElementById('nameSearch').addEventListener('input', filterNames);
  document.getElementById('tabExisting').addEventListener('click', () => switchTab('existing'));
  document.getElementById('tabNew').addEventListener('click', () => switchTab('new'));
  initLiff();
});

// ── LIFF 初期化 ──

async function initLiff() {
  try {
    if (!PUBLIC_CONFIG.liffId) throw new Error('LIFF_ID が未設定です。');
    await liff.init({ liffId: PUBLIC_CONFIG.liffId });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    S.idToken = liff.getIDToken();
    const d = liff.getDecodedIDToken();
    S.lineProfileName = d && d.name ? d.name : '';
    setStatus('LINE認証済み');
    loadSession();
  } catch(e) { showMsg(e.message||String(e),'error'); setStatus('初期化失敗'); }
}

function loadSession() {
  run('initializeSession', [S.idToken], r => {
    S.member = r.member;
    S.schedule = r.schedule || [];
    S.isAdmin = r.isAdmin;
    el('appTitle').textContent = r.appTitle || PUBLIC_CONFIG.appTitle;
    el('lineProfileName').textContent = r.lineProfileName || S.lineProfileName || '-';
    if (r.memberFound && r.member) {
      setMemberInfo(r.member);
      hide('registerCard');
      show('teamCard'); show('resultCard'); show('winRateCard');
      populateTeamSelect(); doRefreshWinRates();
    } else {
      show('registerCard');
      loadMemberNames();
    }
    renderSchedule(r.schedule || []);
    if (r.isAdmin) {
      show('adminCard');
      el('exportListBtn').classList.remove('hidden');
      loadAdminView();
    }
    showMsg('初期化が完了しました。','success');
  });
}

// ── 名簿から名前リスト取得（初回登録用）──

function loadMemberNames() {
  // Members シートから fullName 一覧を取得（lineId 未設定のもの）
  run('getMemberNamesForRegistration', [S.idToken], r => {
    S.memberNames = r.names || [];
    renderNameList(S.memberNames);
  });
}

function renderNameList(names) {
  const list = el('nameList');
  list.innerHTML = '';
  names.forEach(n => {
    const d = document.createElement('div');
    d.className = 'name-item';
    d.textContent = n;
    d.addEventListener('click', () => selectName(n));
    list.appendChild(d);
  });
  if (names.length) show('nameList');
}

function filterNames() {
  const q = el('nameSearch').value.trim();
  if (!q) { renderNameList(S.memberNames); return; }
  const filtered = S.memberNames.filter(n => n.includes(q));
  renderNameList(filtered);
}

function selectName(name) {
  el('selectedName').textContent = '選択: ' + name;
  el('registerButton').disabled = false;
  el('registerButton').dataset.name = name;
  // ハイライト
  el('nameList').querySelectorAll('.name-item').forEach(d => {
    d.classList.toggle('selected', d.textContent === name);
  });
}

// ── タブ切り替え ──

function switchTab(tab) {
  if (tab === 'new') {
    hide('existingPane'); show('newPane');
    el('tabNew').classList.add('active'); el('tabExisting').classList.remove('active');
  } else {
    show('existingPane'); hide('newPane');
    el('tabExisting').classList.add('active'); el('tabNew').classList.remove('active');
  }
}

// ── 初回登録（既存メンバー紐付け）──

function doRegister() {
  const name = el('registerButton').dataset.name;
  if (!name) { showMsg('氏名を選択してください。','error'); return; }
  disableAll(true);
  run('registerMember', [{ idToken: S.idToken, fullName: name }], r => {
    disableAll(false);
    S.member = r.member;
    setMemberInfo(r.member);
    hide('registerCard');
    showMsg('登録完了しました。','success');
    loadSession();
  });
}

// ── 新規メンバー登録 ──

function doRegisterNew() {
  const fullName = el('newFullName').value.trim();
  const furigana = el('newFurigana').value.trim();
  const gender = el('newGender').value;
  const birthDate = el('newBirthDate').value;
  const mobilePhone = el('newMobilePhone').value.trim();
  if (!fullName) { showMsg('氏名を入力してください。','error'); return; }
  if (!gender) { showMsg('性別を選択してください。','error'); return; }
  disableAll(true);
  run('registerNewMember', [{ idToken: S.idToken, fullName, furigana, gender, birthDate, mobilePhone }], r => {
    disableAll(false);
    S.member = r.member;
    setMemberInfo(r.member);
    hide('registerCard');
    showMsg('新規登録が完了しました。','success');
    loadSession();
  });
}

// ── 出欠保存 ──

function doSave() {
  if (!S.member) { showMsg('先に初回登録を完了してください。','error'); return; }
  disableAll(true);
  run('submitAvailability', [{ idToken: S.idToken, answers: collectAnswers() }], r => {
    disableAll(false);
    if (!r.ok) { if (r.needsRegistration) show('registerCard'); showMsg(r.message||'保存失敗','error'); return; }
    S.schedule = r.schedule || [];
    renderSchedule(r.schedule || []);
    el('lastSavedAt').textContent = '最終保存: ' + r.savedAt;
    showMsg(r.message||'保存しました。','success');
    if (S.isAdmin) loadAdminView();
    populateTeamSelect();
  });
}

// ── スケジュール描画 ──

function renderSchedule(months) {
  const root = el('scheduleRoot');
  root.innerHTML = '';
  if (!months.length) { root.innerHTML = '<p class="muted">現在回答可能な予定はありません。</p>'; return; }
  months.forEach(month => {
    const sec = document.createElement('section');
    sec.className = 'month-section';
    sec.innerHTML = '<h3>' + esc(month.monthKey) + '</h3>';
    month.sessions.forEach(s => {
      const art = document.createElement('article');
      art.className = 'session-card';
      art.dataset.sessionId = s.sessionId;
      art.innerHTML =
        '<div class="session-header"><div>' +
          '<div class="session-date">' + esc(s.eventDate) + '</div>' +
          '<div class="session-title">' + esc(s.title) + '</div>' +
          (s.note ? '<div class="muted">' + esc(s.note) + '</div>' : '') +
        '</div><div class="status-block">' +
          '<span class="pill">' + esc(s.statusLabel) + '</span>' +
          '<span class="muted">参加 ' + s.counts.yes + ' / 不参加 ' + s.counts.no + ' / 未定 ' + s.counts.undecided + '</span>' +
        '</div></div>' +
        '<div class="answer-row">' +
          '<label><input type="radio" name="a-' + s.sessionId + '" value="yes"> 参加</label>' +
          '<label><input type="radio" name="a-' + s.sessionId + '" value="no"> 不参加</label>' +
          '<label><input type="radio" name="a-' + s.sessionId + '" value="undecided" checked> 未定</label>' +
        '</div>' +
        '<label class="note-field"><span>備考</span><input type="text" class="session-note-input" placeholder="任意"/></label>';
      sec.appendChild(art);
    });
    root.appendChild(sec);
  });
}

function collectAnswers() {
  return Array.from(document.querySelectorAll('.session-card')).map(c => ({
    sessionId: c.dataset.sessionId,
    answer: (c.querySelector('input[name="a-' + c.dataset.sessionId + '"]:checked') || {}).value || 'undecided',
    note: c.querySelector('.session-note-input').value,
  }));
}

// ── 管理者: 当日参加チェック ──

function loadAdminView() {
  const mk = S.schedule && S.schedule[0] ? S.schedule[0].monthKey : '';
  if (!mk) return;
  run('getAdminData', [S.idToken, mk], r => { renderAdmin(r.schedule || []); });
}

function renderAdmin(months) {
  const root = el('adminRoot');
  root.innerHTML = '';
  months.forEach(month => {
    month.sessions.forEach(s => {
      const box = document.createElement('div');
      box.className = 'admin-box';
      const list = (s.attendees||[]).map(m =>
        '<label class="admin-check"><input type="checkbox" data-uid="' + esc(m.lineId) + '"' +
        (m.answer==='attended'?' checked':'') + '><span>' + esc(m.fullName) + '</span></label>'
      ).join('');
      box.innerHTML =
        '<div class="session-header"><div>' +
          '<div class="session-date">' + esc(s.eventDate) + '</div>' +
          '<div class="session-title">' + esc(s.title) + '</div>' +
        '</div>' +
        '<button class="secondary" data-action="mark" data-sid="' + esc(s.sessionId) + '">当日参加を保存</button></div>' +
        '<div class="admin-list">' + (list || '<span class="muted">参加予定者なし</span>') + '</div>';
      root.appendChild(box);
    });
  });
  root.querySelectorAll('[data-action="mark"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const box = btn.closest('.admin-box');
      const ids = Array.from(box.querySelectorAll('input[type="checkbox"]:checked')).map(i => i.dataset.uid);
      disableAll(true);
      run('markAttendance', [{ idToken: S.idToken, sessionId: btn.dataset.sid, presentLineUserIds: ids }], r => {
        disableAll(false);
        S.schedule = r.schedule || [];
        renderSchedule(r.schedule || []);
        renderAdmin(r.schedule || []);
        showMsg(r.message||'更新しました。','success');
      });
    });
  });
}

// ── 管理者: チーム編成 ──

function populateTeamSelect() {
  const sel = el('teamSessionSelect');
  sel.innerHTML = '';
  (S.schedule||[]).forEach(m => {
    m.sessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.sessionId;
      opt.textContent = s.eventDate + ' ' + s.title + '（参加' + s.counts.yes + '名）';
      sel.appendChild(opt);
    });
  });
}

function doGenerateTeams() {
  const sessionId = el('teamSessionSelect').value;
  const numGames = Number(el('numGamesSelect').value);
  if (!sessionId) { showMsg('予定を選択してください。','error'); return; }
  disableAll(true);
  run('generateTeams', [{ idToken: S.idToken, sessionId, numGames }], r => {
    disableAll(false);
    renderTeamResult(r.result);
    showMsg(r.message||'チーム編成完了','success');
  });
}

function renderTeamResult(result) {
  const root = el('teamResult');
  root.innerHTML = '<p><strong>' + esc(result.summary) + '</strong></p>';
  S.lastTeamResult = result; // 結果入力用に保持
  result.games.forEach(g => {
    let html = '<div class="game-block"><div class="game-title">第' + g.gameNumber + 'ゲーム</div>';
    html += '<div class="matchup">' + g.matchups.map(esc).join(' / ') + '</div>';
    html += '<div class="teams-grid">';
    g.teams.forEach(t => {
      html += '<div class="team-box"><div class="team-name">' + esc(t.name) + '</div>';
      html += '<div class="team-meta">' + esc(t.genderSummary) + ' / ' + esc(t.ageSummary) + ' / 勝率' + esc(t.avgWinRate) + '</div>';
      t.members.forEach(m => {
        const wr = m.totalGames > 0 ? ' 勝率' + m.winRate + '%' : '';
        html += '<div class="team-member">' + esc(m.fullName) + ' <span class="muted">' + esc(m.gender) + (m.ageApril1 ? ' ' + m.ageApril1 + '歳' : '') + wr + '</span></div>';
      });
      html += '</div>';
    });
    html += '</div></div>';
    root.innerHTML += html;
  });
  renderResultInputs(result);
}

// ── 管理者: 試合結果入力 ──

function renderResultInputs(result) {
  const root = el('resultRoot');
  root.innerHTML = '';
  result.games.forEach(g => {
    g.matchups.forEach((mu, mi) => {
      // 対戦カードからチーム名を抽出
      const teamNames = g.teams.map(t => t.name);
      let tA, tB;
      if (result.numTeams === 4) {
        tA = teamNames[mi * 2];
        tB = teamNames[mi * 2 + 1];
      } else {
        tA = teamNames[0]; tB = teamNames[1];
      }
      // 対戦組合せテキストからチーム名を取得
      const match = mu.match(/(.+?)\s*vs\s*(.+?)（/);
      if (match) { tA = match[1].trim(); tB = match[2].trim(); }

      const div = document.createElement('div');
      div.className = 'game-block';
      div.innerHTML =
        '<div class="game-title">第' + g.gameNumber + 'ゲーム' + (result.numTeams === 4 ? '（コート' + (mi+1) + '）' : '') + '</div>' +
        '<div class="score-row">' +
          '<span class="score-team">' + esc(tA) + '</span>' +
          '<input type="number" class="score-input" data-game="' + g.gameNumber + '" data-match="' + mi + '" data-side="A" data-team="' + esc(tA) + '" min="0" max="99" placeholder="0"/>' +
          '<span class="score-vs">-</span>' +
          '<input type="number" class="score-input" data-game="' + g.gameNumber + '" data-match="' + mi + '" data-side="B" data-team="' + esc(tB) + '" min="0" max="99" placeholder="0"/>' +
          '<span class="score-team">' + esc(tB) + '</span>' +
        '</div>';
      root.appendChild(div);
    });
  });
}

function doSaveResults() {
  const sessionId = el('teamSessionSelect').value;
  if (!sessionId) { showMsg('予定を選択してください。','error'); return; }
  // スコア収集
  const inputs = document.querySelectorAll('.score-input');
  const map = {};
  inputs.forEach(inp => {
    const key = inp.dataset.game + '|' + inp.dataset.match;
    if (!map[key]) map[key] = { gameNumber: Number(inp.dataset.game) };
    if (inp.dataset.side === 'A') { map[key].teamA = inp.dataset.team; map[key].scoreA = inp.value; }
    else { map[key].teamB = inp.dataset.team; map[key].scoreB = inp.value; }
  });
  const results = Object.values(map).filter(r => r.scoreA !== '' || r.scoreB !== '');
  // eventDate取得
  const sel = el('teamSessionSelect');
  const evtText = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : '';
  const evtDate = evtText.split(' ')[0] || '';
  results.forEach(r => r.eventDate = evtDate);

  if (!results.length) { showMsg('スコアを入力してください。','error'); return; }
  disableAll(true);
  run('submitGameResults', [{ idToken: S.idToken, sessionId, results }], r => {
    disableAll(false);
    showMsg(r.message || '結果を保存しました。','success');
    doRefreshWinRates();
  });
}

// ── 管理者: 勝率一覧 ──

function doRefreshWinRates() {
  run('getWinRates', [S.idToken], r => {
    renderWinRates(r.winRates || {});
  });
}

function renderWinRates(winRates) {
  const root = el('winRateRoot');
  const entries = Object.entries(winRates).sort((a, b) => b[1].winRate - a[1].winRate);
  if (!entries.length) { root.innerHTML = '<p class="muted">まだ試合結果がありません。</p>'; return; }
  let html = '<table class="wr-table"><tr><th>氏名</th><th>試合</th><th>勝</th><th>負</th><th>分</th><th>勝率</th></tr>';
  entries.forEach(([name, s]) => {
    html += '<tr><td>' + esc(name) + '</td><td>' + s.games + '</td><td>' + s.wins + '</td><td>' + s.losses + '</td><td>' + s.draws + '</td><td><strong>' + s.winRate + '%</strong></td></tr>';
  });
  html += '</table>';
  root.innerHTML = html;
}

// ── 管理者: 参加者リスト出力 ──

function doExportList() {
  const sessionId = el('teamSessionSelect').value;
  if (!sessionId) { showMsg('予定を選択してください。','error'); return; }
  disableAll(true);
  run('generateExportList', [{ idToken: S.idToken, sessionId }], r => {
    disableAll(false);
    showMsg(r.message||'出力完了','success');
  });
}

// ── ユーティリティ ──

function setMemberInfo(m) {
  el('memberName').textContent = m.fullName || '-';
  el('memberNo').textContent = m.no || '-';
}

function run(fn, args, onOk) {
  const r = google.script.run.withSuccessHandler(result => {
    if (result && result.ok === false && !result.needsRegistration) { showMsg(result.message||'エラー','error'); return; }
    onOk(result);
  }).withFailureHandler(e => { disableAll(false); showMsg(normErr(e),'error'); });
  // google.script.run は可変引数非対応なので引数数で分岐
  if (args.length === 1) r[fn](args[0]);
  else if (args.length === 2) r[fn](args[0], args[1]);
  else r[fn]();
}

function el(id) { return document.getElementById(id); }
function show(id) { el(id).classList.remove('hidden'); }
function hide(id) { el(id).classList.add('hidden'); }
function disableAll(d) { document.querySelectorAll('button').forEach(b => b.disabled = d); }
function showMsg(t, type) { const a = el('messageArea'); a.className = 'message ' + (type||'info'); a.textContent = t; }
function setStatus(t) { el('connectionStatus').textContent = t; }
function normErr(e) { return e ? (typeof e==='string' ? e : e.message||JSON.stringify(e)) : '不明なエラー'; }
function esc(v) { return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
